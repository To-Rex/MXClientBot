<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bot Boshqaruv Paneli{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f9f9fb;
            --surface: #ffffff;
            --border: #e8e8ed;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-subtle: #eef2ff;
            --success: #22c55e;
            --success-subtle: #f0fdf4;
            --danger: #ef4444;
            --danger-subtle: #fef2f2;
            --warning: #f59e0b;
            --warning-subtle: #fffbeb;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 1px 3px rgba(0,0,0,0.06), 0 6px 16px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(12px);
            background: rgba(255,255,255,0.85);
        }

        nav .nav-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        nav .nav-brand {
            font-weight: 700;
            font-size: 17px;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        nav .nav-brand .icon {
            width: 34px;
            height: 34px;
            background: var(--accent);
            color: #fff;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        nav .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        nav .nav-user {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }
        nav .nav-logout {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.15s;
        }
        nav .nav-logout:hover {
            background: var(--danger-subtle);
            color: var(--danger);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all 0.15s ease;
            letter-spacing: -0.2px;
            white-space: nowrap;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 1px 2px rgba(99,102,241,0.3); }
        .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 2px 8px rgba(99,102,241,0.35); }

        .btn-success { background: var(--success); color: #fff; box-shadow: 0 1px 2px rgba(34,197,94,0.3); }
        .btn-success:hover { background: #16a34a; box-shadow: 0 2px 8px rgba(34,197,94,0.35); }

        .btn-danger { background: var(--danger); color: #fff; box-shadow: 0 1px 2px rgba(239,68,68,0.3); }
        .btn-danger:hover { background: #dc2626; box-shadow: 0 2px 8px rgba(239,68,68,0.35); }

        .btn-warning { background: var(--warning); color: #fff; box-shadow: 0 1px 2px rgba(245,158,11,0.3); }
        .btn-warning:hover { background: #d97706; box-shadow: 0 2px 8px rgba(245,158,11,0.35); }

        .btn-ghost {
            background: var(--surface);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--bg); color: var(--text); }

        .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 6px; }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 24px;
            transition: box-shadow 0.2s ease;
        }
        .card:hover { box-shadow: var(--shadow-md); }

        /* Table */
        .table-wrap {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 14px 20px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 20px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.1s ease; }
        tbody tr:hover { background: var(--bg); }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: -0.1px;
        }
        .badge-active { background: var(--success-subtle); color: #15803d; }
        .badge-active::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
        .badge-inactive { background: var(--danger-subtle); color: #b91c1c; }
        .badge-inactive::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--danger); }

        /* Actions */
        .actions { display: flex; gap: 6px; align-items: center; }

        /* Form */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
            background: var(--surface);
            color: var(--text);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .form-group input::placeholder { color: #c4c4cd; }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--bg);
            border-radius: var(--radius-sm);
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .checkbox-group label {
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text);
            text-transform: none;
            letter-spacing: 0;
            margin: 0;
        }

        /* Header row */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .back-link {
            font-size: 14px;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
            transition: color 0.15s;
        }
        .back-link:hover { color: var(--text); }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .stat-card .stat-value {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text);
            line-height: 1;
        }
        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .stat-card.accent { border-left: 3px solid var(--accent); }
        .stat-card.success { border-left: 3px solid var(--success); }

        /* Info table */
        .info-table { width: 100%; }
        .info-table td { padding: 10px 0; font-size: 14px; }
        .info-table td:first-child { color: var(--text-muted); font-weight: 500; width: 160px; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state p {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 20px;
        }
        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Row highlight */
        .company-name { color: var(--text-muted); font-size: 13px; }
        .user-count { font-weight: 600; }

        .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="/panel" class="nav-brand">
                <span class="icon">&#9883;</span>
                Bot Boshqaruv Paneli
            </a>
        </div>
        {% if username %}
        <div class="nav-right">
            <a href="/panel/profile" class="nav-logout" style="color:var(--accent);">Profil</a>
            <span class="nav-user">&#128100; {{ username }}</span>
            <a href="/logout" class="nav-logout">Chiqish</a>
        </div>
        {% endif %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
