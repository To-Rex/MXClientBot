{% extends "base.html" %}
{% block title %}Kirish{% endblock %}
{% block content %}
<div style="display:flex;justify-content:center;align-items:center;min-height:70vh;">
    <div class="card" style="width:100%;max-width:400px;">
        <h1 style="text-align:center;margin-bottom:24px;">Kirish</h1>

        {% if error %}
        <div class="alert alert-info" style="background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" name="email" required placeholder="admin" autofocus>
            </div>
            <div class="form-group">
                <label for="password">Parol</label>
                <input type="password" id="password" name="password" required placeholder="parol">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Kirish</button>
        </form>
    </div>
</div>
{% endblock %}
